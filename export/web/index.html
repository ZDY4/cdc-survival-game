<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDC 末日生存游戏</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .info {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 20px;
            line-height: 1.6;
        }
        .features {
            text-align: left;
            margin: 20px 0;
        }
        .features li {
            margin: 8px 0;
            list-style: none;
            padding-left: 24px;
            position: relative;
        }
        .features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4CAF50;
        }
        #game-frame {
            display: none;
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div id="launcher" class="container">
        <div class="logo">🎮</div>
        <h1>CDC 末日生存</h1>
        <div class="subtitle">硬核末日生存 RPG</div>
        
        <div class="card">
            <ul class="features">
                <li>开放世界探索</li>
                <li>硬核生存机制</li>
                <li>回合制战斗</li>
                <li>物品制作系统</li>
            </ul>
        </div>
        
        <a id="play-btn" href="game.html" class="btn btn-primary">开始游戏</a>
        <a id="browser-btn" href="https://cdc-apocalypse-1402298145.cos.ap-chengdu.myqcloud.com/games/cdc-h5/game.html" target="_blank" class="btn btn-secondary" style="display:none;">在外部浏览器中打开 →</a>
        
        <div class="info">
            推荐在 Chrome、Safari 或 Firefox 中游玩
        </div>
    </div>
    
    <iframe id="game-frame" src=""></iframe>
    
    <script>
        // 检测是否在 Telegram 中
        const isTelegram = window.Telegram && Telegram.WebApp;
        
        if (isTelegram) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            
            // 尝试直接加载游戏
            const gameUrl = 'game.html';
            
            // 检测 fetch 是否可用
            fetch(gameUrl, { method: 'HEAD' })
                .then(() => {
                    // fetch 可用，直接跳转
                    document.getElementById('play-btn').href = gameUrl;
                })
                .catch(() => {
                    // fetch 失败，显示外部浏览器按钮
                    document.getElementById('play-btn').style.display = 'none';
                    document.getElementById('browser-btn').style.display = 'block';
                    document.querySelector('.info').textContent = 'Telegram 内置浏览器无法加载游戏资源，请点击上方按钮在外部浏览器中打开';
                });
        }
    </script>
</body>
</html>
