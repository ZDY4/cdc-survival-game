<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
    <title>CDC Survival Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #050508;
            overflow: hidden;
        }
        #canvas { display: block; width: 100%; height: 100%; }
        #status {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff; font-family: sans-serif;
            text-align: center; z-index: 100;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="status">
        <div class="spinner"></div>
        <div>Loading...</div>
    </div>
    <canvas id="canvas"></canvas>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Telegram init
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
        
        // Error handling
        window.onerror = function(msg, url, line) {
            document.getElementById('status').innerHTML = 
                '<div style="color:#ff6b6b;padding:20px;">Error: ' + msg + '<br>Line: ' + line + '</div>';
        };
    </script>
    <script src="index.js"></script>
    <script>
        // Simple config without threads
        const GODOT_CONFIG = {
            "args": [],
            "canvasResizePolicy": 2,
            "executable": "index",
            "fileSizes": {"index.pck": 7185064, "index.wasm": 37004618},
            "focusCanvas": true
        };
        
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        // Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Check if Engine loaded
        if (typeof Engine === 'undefined') {
            statusDiv.innerHTML = '<div style="color:#ff6b6b;">Failed to load engine</div>';
        } else {
            const engine = new Engine(GODOT_CONFIG);
            
            engine.onProgress = function(current, total) {
                const pct = Math.round((current / total) * 100);
                statusDiv.querySelector('div:last-child').textContent = 'Loading... ' + pct + '%';
            };
            
            engine.startGame().then(function() {
                statusDiv.classList.add('hidden');
                if (window.Telegram && Telegram.WebApp) {
                    Telegram.WebApp.ready();
                }
            }).catch(function(err) {
                statusDiv.innerHTML = '<div style="color:#ff6b6b;padding:20px;">' + 
                    'Failed to start:<br>' + (err.message || err) + '</div>';
            });
        }
    </script>
</body>
</html>
