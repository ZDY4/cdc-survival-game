<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>CDC Content Editor</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(80, 137, 196, 0.16), transparent 28%),
          linear-gradient(180deg, #11171d 0%, #0b1015 46%, #0a0e12 100%);
        color: #edf2f7;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(80, 137, 196, 0.16), transparent 28%),
          linear-gradient(180deg, #11171d 0%, #0b1015 46%, #0a0e12 100%);
        transition: opacity 140ms ease;
        z-index: 9999;
      }

      .boot-splash-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-card {
        width: min(420px, calc(100vw - 48px));
        padding: 18px 20px;
        border-radius: 16px;
        border: 1px solid rgba(154, 182, 210, 0.14);
        background: rgba(14, 20, 26, 0.9);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(12px);
      }

      .boot-card strong,
      .boot-card span {
        display: block;
      }

      .boot-card strong {
        margin-bottom: 8px;
        font-size: 1rem;
      }

      .boot-card span {
        color: rgba(237, 242, 247, 0.62);
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" class="boot-splash">
      <div class="boot-card">
        <strong>Loading Narrative Lab</strong>
        <span>Preparing the editor UI…</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
