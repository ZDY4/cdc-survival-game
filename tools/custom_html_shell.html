<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Telegram WebApp Meta Tags -->
    <meta name="telegram:bot" content="@cdc_survival_bot">
    <title>CDC 末日生存</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050508;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Telegram WebApp 安全区域适配 */
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            touch-action: none;
            outline: none;
        }
        
        canvas:focus {
            outline: none;
        }
        
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        
        #status .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 横屏提示 */
        #orientation-hint {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 20px;
        }
        
        #orientation-hint .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        #orientation-hint .text {
            font-size: 18px;
            line-height: 1.6;
        }
        
        @media (orientation: portrait) and (max-width: 600px) {
            #orientation-hint {
                display: flex;
            }
        }

        /* Telegram 主题适配 */
        body.telegram-dark {
            background: #1a1a2e;
        }
        
        body.telegram-light {
            background: #ffffff;
        }
        
        /* Telegram MainButton 样式覆盖 */
        .telegram-main-button {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: var(--tg-theme-button-color, #2ea6ff);
            color: var(--tg-theme-button-text-color, #ffffff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        
        .telegram-main-button.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Telegram WebApp 初始化
        window.telegramWebApp = null;
        window.isTelegramWebApp = false;
        
        if (window.Telegram && Telegram.WebApp) {
            window.telegramWebApp = Telegram.WebApp;
            window.isTelegramWebApp = true;
            
            // 初始化 WebApp
            telegramWebApp.ready();
            
            // 扩展至全屏
            telegramWebApp.expand();
            
            // 设置背景色适配 Telegram 主题
            const colorScheme = telegramWebApp.colorScheme || 'dark';
            document.body.classList.add('telegram-' + colorScheme);
            
            // 设置 Telegram 背景色
            if (telegramWebApp.setBackgroundColor) {
                telegramWebApp.setBackgroundColor(colorScheme === 'dark' ? '#1a1a2e' : '#ffffff');
            }
            
            // 监听主题变化
            telegramWebApp.onEvent('themeChanged', function() {
                const newScheme = telegramWebApp.colorScheme;
                document.body.classList.remove('telegram-dark', 'telegram-light');
                document.body.classList.add('telegram-' + newScheme);
                
                if (telegramWebApp.setBackgroundColor) {
                    telegramWebApp.setBackgroundColor(newScheme === 'dark' ? '#1a1a2e' : '#ffffff');
                }
                
                // 通知 Godot 主题变化
                if (window.godotTelegramBridge) {
                    window.godotTelegramBridge.onThemeChanged(newScheme);
                }
            });
            
            // 监听视口变化
            telegramWebApp.onEvent('viewportChanged', function() {
                if (window.godotTelegramBridge) {
                    window.godotTelegramBridge.onViewportChanged();
                }
            });
            
            console.log('[Telegram WebApp] Initialized successfully');
        } else {
            console.log('[Telegram WebApp] Not running in Telegram environment');
        }
        
        // 阻止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // 阻止页面滚动和缩放
        document.addEventListener('touchmove', function(e) {
            if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
            }
        }, { passive: false });
        
        // 阻止默认触摸行为
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('gesturechange', function(e) {
            e.preventDefault();
        });
        
        document.addEventListener('gestureend', function(e) {
            e.preventDefault();
        });
    </script>
</head>
<body>
    <div id="orientation-hint">
        <div class="icon">📱</div>
        <div class="text">
            推荐横屏游玩<br>
            请旋转设备获得最佳体验
        </div>
    </div>
    
    <div id="status">
        <div class="spinner"></div>
        <div>加载游戏中...</div>
    </div>
    
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    
    <!-- Telegram WebApp Bridge -->
    <script src="telegram_webapp_bridge.js"></script>
    <script src="$GODOT_URL"></script>
    <script>
        const GODOT_CONFIG = $GODOT_CONFIG;
        
        const canvas = document.getElementById('canvas');
        const statusDiv = document.getElementById('status');
        
        // 调整画布大小
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            let width = container.clientWidth;
            let height = container.clientHeight;
            
            // Telegram WebApp 适配：考虑安全区域
            if (window.isTelegramWebApp && window.telegramWebApp) {
                const safeArea = window.telegramWebApp.safeAreaInset || {};
                height -= (safeArea.bottom || 0);
            }
            
            canvas.width = width;
            canvas.height = height;
            
            // 通知 Godot 尺寸变化
            if (window.godotTelegramBridge) {
                window.godotTelegramBridge.onResize(width, height);
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // 创建引擎实例
        const engine = new Engine(GODOT_CONFIG);
        
        // 监听加载进度
        engine.onProgress = function(current, total) {
            const progress = Math.round((current / total) * 100);
            statusDiv.querySelector('div:last-child').textContent = `加载中... ${progress}%`;
        };
        
        // 启动游戏
        engine.startGame().then(function() {
            statusDiv.classList.add('hidden');
            console.log('游戏启动成功');
            
            // 通知 Telegram 游戏已就绪
            if (window.isTelegramWebApp && window.telegramWebApp) {
                window.telegramWebApp.ready();
                
                // 初始化 Godot Telegram Bridge
                if (window.godotTelegramBridge) {
                    window.godotTelegramBridge.init();
                }
            }
        }).catch(function(err) {
            statusDiv.innerHTML = '<div style="color: #ff6b6b;">加载失败<br>' + err + '</div>';
            console.error('游戏启动失败:', err);
        });
        
        // 阻止鼠标右键菜单
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // 处理页面可见性变化
        document.addEventListener('visibilitychange', function() {
            if (window.godotTelegramBridge) {
                window.godotTelegramBridge.onVisibilityChange(document.visibilityState === 'visible');
            }
        });
    </script>
</body>
</html>
